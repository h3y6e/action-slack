name: check

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm run typecheck
      - run: pnpm run format:check
      - run: pnpm run lint
      - uses: h3y6e/action-slack@v4
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,job,took,ref,workflowRun,pullRequest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: failure()
