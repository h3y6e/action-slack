name: check

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-slim
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run format:check
      - run: pnpm run lint
